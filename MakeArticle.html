<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Add a Article</h1>
    <h2>
        <a href="School_hub.html">[Return to the main page]</a>
    </h2>
    <form method="POST">
        <p>
            <label>Category:</label>
            <input type="text" size="30">
        </p>
        <p>
            <label>Type:</label>
            <input type="text" size="30">
        </p>
        <p>
            <label>Name:</label>
            <input type="text" size="30">
        </p>
        <p>
            <label>Born:</label>
            <input type="text" size="30">
        </p>
        <p>
            <label>Died:</label>
            <input type="text" size="30">
        </p>
        <p>
            <label>Nationality:</label>
            <input type="text" size="30">
        </p>
        <p>
            <label>Known For:</label>
            <input type="text" size="30">
        </p>
        <p>
            <label>Notable Work:</label>
            <input type="text" size="30">
        </p>
        <p>
            <label>About:</label>
            <textarea maxlength="300" cols="30" rows="10"></textarea>
        </p>
        <p>
            <label>Year:</label>
            <input type="text" size="30">
        </p>
        <p>
            <label>Medium:</label>
            <input type="text" size="30">
        </p>
        <p>
            <label>Dimensions:</label>
            <input type="text" size="30">
        </p>
        <p>
            <label>Location:</label>
            <input type="text" size="30">
        </p>
        <p>
            <label>Designed By:</label>
            <input type="text" size="30">
        </p>
        <p>
            <label>Developer:</label>
            <input type="text" size="30">
        </p>
        <p>
            <input type="submit" name="submit" value="Add">
            <a href="School_hub.html">[Cancel]</a>
        </p>    
    </form>
</body>
</html>
